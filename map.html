<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morse Reservoir — Wake Surf Conditions</title>
  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f0f0f0;
      height: 100dvh;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    /* ── Bottom info card ── */
    #info-card {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 10, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 18px 28px;
      min-width: 320px;
      max-width: 520px;
      width: calc(100% - 48px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    #info-card .wind-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    #info-card .wind-stat {
      display: flex;
      flex-direction: column;
    }

    #info-card .wind-stat .label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    #info-card .wind-stat .value {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      line-height: 1.1;
    }

    #info-card .wind-stat .unit {
      font-size: 12px;
      color: #aaa;
    }

    #info-card .divider {
      width: 1px;
      height: 36px;
      background: rgba(255, 255, 255, 0.12);
    }

    #info-card .summary {
      font-size: 13px;
      color: #ccc;
      line-height: 1.5;
    }

    /* ── Legend ── */
    #legend {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(10, 10, 10, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    #legend .legend-title {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 2px;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #ddd;
    }

    #legend .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="info-card">
  <div class="wind-row">
    <div class="wind-stat">
      <span class="label">Wind Speed</span>
      <span class="value" id="wind-speed">—</span>
      <span class="unit">mph</span>
    </div>
    <div class="divider"></div>
    <div class="wind-stat">
      <span class="label">Direction</span>
      <span class="value" id="wind-dir">—</span>
      <span class="unit" id="wind-dir-deg"></span>
    </div>
  </div>
  <div class="summary" id="summary">Loading conditions…</div>
</div>

<div id="legend">
  <div class="legend-title">Conditions</div>
  <div class="legend-item"><div class="swatch" style="background:#2ECC71"></div>Glass + Deep</div>
  <div class="legend-item"><div class="swatch" style="background:#F1C40F"></div>Calm / Shallow</div>
  <div class="legend-item"><div class="swatch" style="background:#E67E22"></div>Moderate</div>
  <div class="legend-item"><div class="swatch" style="background:#E74C3C"></div>Rough</div>
</div>

<script>
const MORSE_LAT  = 40.093;
const MORSE_LNG  = -86.044;
const DIRECTIONS  = ['N','NE','E','SE','S','SW','W','NW'];
const DIR_DEGREES = [0, 45, 90, 135, 180, 225, 270, 315];

function nearestDirection(deg) {
  deg = ((deg % 360) + 360) % 360;
  const deltas = DIR_DEGREES.map(d => Math.abs(((deg - d + 180) % 360) - 180));
  return DIRECTIONS[deltas.indexOf(Math.min(...deltas))];
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] ? vals[i].trim() : ''; });
    return obj;
  });
}

function windCondition(score) {
  if (score <= 33) return 'Glass';
  if (score <= 66) return 'Moderate';
  return 'Rough';
}

function depthTier(depthFt) {
  if (depthFt >= 15) return 'Deep';
  if (depthFt >= 8)  return 'Moderate Depth';
  return 'Shallow';
}

function finalCondition(windCond, depthT) {
  if (windCond === 'Rough')    return 'RED';
  if (depthT   === 'Shallow')  return 'YELLOW';
  if (windCond === 'Glass')    return 'GREEN';
  return 'ORANGE';
}

function lakeSummary(counts, total, windSpeed, dirName) {
  const greenPct  = counts.GREEN  / total * 100;
  const orangePct = counts.ORANGE / total * 100;
  const redPct    = counts.RED    / total * 100;
  let mood, detail;
  if (redPct > 40) {
    mood = 'choppy out there';
    detail = 'wind is up and fetch is long — probably not the day';
  } else if (redPct > 15 || orangePct > 40) {
    mood = 'mixed conditions';
    detail = 'glass on the sheltered end, rougher toward the channel';
  } else if (greenPct > 70) {
    mood = 'looking great right now';
    detail = 'glass conditions on the main channel';
  } else if (greenPct > 40) {
    mood = 'decent out there';
    detail = 'some glass water available, check the deeper sections';
  } else {
    mood = 'marginal today';
    detail = 'light wind but shallow areas limiting options';
  }
  return `Morse is ${mood} — ${detail}.`;
}

async function loadLiveData() {
  const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${MORSE_LAT}&longitude=${MORSE_LNG}&current_weather=true&wind_speed_unit=mph`;

  const [weatherResp, fetchCSVResp, depthCSVResp] = await Promise.all([
    fetch(weatherUrl),
    fetch('morse_fetch.csv'),
    fetch('morse_grid_depth.csv'),
  ]);

  const weatherJson = await weatherResp.json();
  const fetchCSVText = await fetchCSVResp.text();
  const depthCSVText = await depthCSVResp.text();

  const cw        = weatherJson.current_weather;
  const windSpeed = cw.windspeed;
  const windDirDeg = cw.winddirection;
  const dirName   = nearestDirection(windDirDeg);
  const fetchCol  = `fetch_${dirName}`;

  const fetchRows = parseCSV(fetchCSVText);
  const depthRows = parseCSV(depthCSVText);
  const depthMap  = {};
  depthRows.forEach(r => { depthMap[r.point_id] = r; });

  const validRows     = fetchRows.filter(r => depthMap[r.point_id] && r[fetchCol]);
  const rawRoughness  = validRows.map(r => parseFloat(r[fetchCol]) * (windSpeed ** 2));
  const rmin = Math.min(...rawRoughness);
  const rmax = Math.max(...rawRoughness);
  const normalized = rawRoughness.map(r =>
    rmax > rmin ? Math.round(((r - rmin) / (rmax - rmin) * 100) * 10) / 10 : 0
  );

  const counts = { GREEN: 0, YELLOW: 0, ORANGE: 0, RED: 0 };
  const points = validRows.map((row, i) => {
    const score   = normalized[i];
    const depthFt = parseFloat(depthMap[row.point_id].depth_ft);
    const wCond   = windCondition(score);
    const dTier   = depthTier(depthFt);
    const fCond   = finalCondition(wCond, dTier);
    counts[fCond]++;
    return {
      latitude:        parseFloat(row.latitude),
      longitude:       parseFloat(row.longitude),
      final_condition: fCond,
      roughness_score: score,
      depth_ft:        depthFt,
    };
  });

  return {
    wind_speed:     windSpeed,
    wind_direction: windDirDeg,
    wind_dir_label: dirName,
    summary:        lakeSummary(counts, points.length, windSpeed, dirName),
    counts,
    points,
  };
}

function buildGeoJSON(points) {
  return {
    type: 'FeatureCollection',
    features: points.map(p => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [p.longitude, p.latitude] },
      properties: {
        condition: p.final_condition,
        roughness: p.roughness_score,
        depth:     p.depth_ft,
      },
    })),
  };
}

function updateUI(data) {
  document.getElementById('wind-speed').textContent   = data.wind_speed.toFixed(1);
  document.getElementById('wind-dir').textContent     = data.wind_dir_label;
  document.getElementById('wind-dir-deg').textContent = `${data.wind_direction}°`;
  document.getElementById('summary').textContent      = data.summary;
}

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-86.044, 40.093],
  zoom: 13,
  pitchWithRotate: false,
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-left');

map.on('load', async () => {
  document.getElementById('summary').textContent = 'Fetching live conditions…';

  const data    = await loadLiveData();
  const geojson = buildGeoJSON(data.points);

  updateUI(data);

  map.addSource('conditions', { type: 'geojson', data: geojson });

  map.addLayer({
    id: 'conditions-blur',
    type: 'circle',
    source: 'conditions',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'],
        10, 60, 11, 50, 12, 40, 13, 30, 14, 20, 15, 15,
      ],
      'circle-blur': 1.0,
      'circle-opacity': 0.35,
      'circle-color': [
        'match', ['get', 'condition'],
        'GREEN',  '#2ECC71',
        'YELLOW', '#F1C40F',
        'ORANGE', '#E67E22',
        'RED',    '#E74C3C',
        '#888888',
      ],
      'circle-stroke-width': 0,
    },
  });

  map.addLayer({
    id: 'conditions-display',
    type: 'circle',
    source: 'conditions',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'],
        10, 28, 11, 22, 12, 18, 13, 14, 14, 10, 15, 8,
      ],
      'circle-blur': ['interpolate', ['linear'], ['zoom'],
        10, 0.8, 11, 0.7, 12, 0.5, 13, 0.4, 14, 0.2, 15, 0.1,
      ],
      'circle-opacity': 0.75,
      'circle-color': [
        'match', ['get', 'condition'],
        'GREEN',  '#2ECC71',
        'YELLOW', '#F1C40F',
        'ORANGE', '#E67E22',
        'RED',    '#E74C3C',
        '#888888',
      ],
      'circle-stroke-width': 0,
    },
  });
});
</script>
</body>
</html>
