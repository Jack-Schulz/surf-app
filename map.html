<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morse Reservoir — Wake Surf Conditions</title>
  <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f0f0f0;
      height: 100dvh;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    /* ── Legend ── */
    #legend {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(10, 10, 10, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    #legend .legend-title {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 2px;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #ddd;
    }

    #legend .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="wind-card" style="position:absolute;top:80px;left:10px;z-index:1;background:rgba(20,20,30,0.85);color:#fff;padding:10px 14px;border-radius:6px;font-family:sans-serif;font-size:12px;line-height:1.8;">
  <div><span id="wind-arrow" style="display:inline-block;">↑</span> <span id="wind-speed">—</span> mph · <span id="wind-label">—</span></div>
  <div id="wind-dir">—</div>
  <div>Updated <span id="last-updated">—</span></div>
</div>

<div id="legend">
  <div class="legend-title">Conditions</div>
  <div class="legend-item"><div class="swatch" style="background:#2ECC71"></div>Glass + Deep</div>
  <div class="legend-item"><div class="swatch" style="background:#F1C40F"></div>Calm / Shallow</div>
  <div class="legend-item"><div class="swatch" style="background:#E67E22"></div>Moderate</div>
  <div class="legend-item"><div class="swatch" style="background:#E74C3C"></div>Rough</div>
</div>

<script>
// Weight encodes condition as a 0–1 value so the heatmap color ramp
// can map each condition to a distinct color.
const CONDITION_WEIGHT = {
  GREEN:  0.9,
  YELLOW: 0.55,
  ORANGE: 0.35,
  RED:    0.05,
};

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-86.044, 40.093],
  zoom: 13,
  pitchWithRotate: false,
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-left');

async function loadConditions() {
  const resp = await fetch('conditions_data.json?v=' + Date.now());
  return resp.json();
}

function buildGeoJSON(points) {
  return {
    type: 'FeatureCollection',
    features: points.map(p => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [p.longitude, p.latitude] },
      properties: {
        condition: p.final_condition,
        weight: CONDITION_WEIGHT[p.final_condition] ?? 0.5,
        roughness: p.roughness_score,
        depth: p.depth_ft,
      },
    })),
  };
}

function windLabel(speed) {
  if (speed <= 4)  return 'Glass';
  if (speed <= 8)  return 'Rippled';
  if (speed <= 13) return 'Choppy';
  if (speed <= 19) return 'Rough';
  return 'Stay Home';
}

function updateUI(data) {
  document.getElementById('wind-speed').textContent = data.wind_speed.toFixed(1);
  document.getElementById('wind-dir').textContent   = data.wind_dir_label;
  document.getElementById('wind-label').textContent = windLabel(data.wind_speed);
  document.getElementById('wind-arrow').style.transform = `rotate(${data.wind_direction}deg)`;
  document.getElementById('last-updated').textContent   = data.last_updated || '—';
}

function addBestMarker(map, points) {
  const best = points
    .filter(p => p.final_condition === 'GREEN' || p.final_condition === 'GOLD')
    .sort((a, b) => a.roughness_score - b.roughness_score)[0];
  if (!best) return;

  const el = document.createElement('div');
  el.style.cssText = 'width:12px;height:12px;border-radius:50%;background:#2ECC71;border:2px solid #fff;position:relative;cursor:default;';
  const label = document.createElement('div');
  label.textContent = 'Best right now';
  label.style.cssText = 'position:absolute;top:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(20,20,30,0.85);color:#fff;font-family:sans-serif;font-size:10px;padding:2px 6px;border-radius:4px;pointer-events:none;';
  el.appendChild(label);

  new maplibregl.Marker({ element: el })
    .setLngLat([best.longitude, best.latitude])
    .addTo(map);
}

map.on('load', async () => {
  const data    = await loadConditions();
  const geojson = buildGeoJSON(data.points);

  updateUI(data);
  addBestMarker(map, data.points);

  map.addSource('conditions', {
    type: 'geojson',
    data: geojson,
  });

  map.addLayer({
    id: 'conditions-blur',
    type: 'circle',
    source: 'conditions',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'],
        10, 60,
        11, 50,
        12, 40,
        13, 30,
        14, 20,
        15, 15,
      ],
      'circle-blur': 1.0,
      'circle-opacity': 0.35,
      'circle-color': [
        'match', ['get', 'condition'],
        'GREEN',  '#2ECC71',
        'GOLD',   '#2ECC71',
        'YELLOW', '#F1C40F',
        'ORANGE', '#E67E22',
        'RED',    '#E74C3C',
        '#888888',
      ],
      'circle-stroke-width': 0,
    },
  });

  map.addLayer({
    id: 'conditions-display',
    type: 'circle',
    source: 'conditions',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'],
        10, 28,
        11, 22,
        12, 18,
        13, 14,
        14, 10,
        15,  8,
      ],
      'circle-blur': ['interpolate', ['linear'], ['zoom'],
        10, 0.8,
        11, 0.7,
        12, 0.5,
        13, 0.4,
        14, 0.2,
        15, 0.1,
      ],
      'circle-opacity': 0.75,
      'circle-color': [
        'match', ['get', 'condition'],
        'GREEN',  '#2ECC71',
        'GOLD',   '#2ECC71',
        'YELLOW', '#F1C40F',
        'ORANGE', '#E67E22',
        'RED',    '#E74C3C',
        '#888888',
      ],
      'circle-stroke-width': 0,
    },
  });
});
</script>
</body>
</html>
